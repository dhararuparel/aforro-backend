version: "3.9"

# ============================================================
# Aforro Backend — Docker Compose
#
# Services:
#   postgres  - PostgreSQL 16 database
#   redis     - Redis 7 for caching and Celery broker
#   web       - Django application server
#   celery    - Celery worker for async tasks
#
# Usage:
#   docker-compose up --build          # Start all services
#   docker-compose up -d               # Start in background
#   docker-compose exec web python manage.py seed_data
#   docker-compose logs -f celery      # Watch Celery logs
# ============================================================

services:

  # ------------------------------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aforro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aforro_db}
      POSTGRES_USER: ${DB_USER:-aforro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aforro_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aforro_user} -d ${DB_NAME:-aforro_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aforro_net

  # ------------------------------------------------------------------
  # Redis (cache + Celery broker + result backend)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aforro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aforro_net

  # ------------------------------------------------------------------
  # Django Web Application
  # ------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: aforro_web
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    ports:
      - "8000:8000"
    volumes:
      - .:/app                        # Live reload in development
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aforro_net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ------------------------------------------------------------------
  # Celery Worker
  # ------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: aforro_celery
    restart: unless-stopped
    entrypoint: []
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aforro_net

# ------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local

# ------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------
networks:
  aforro_net:
    driver: bridge
